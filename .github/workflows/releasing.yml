name: 'Release Uniasset AudioPlayer'

on:
  push:
    tags: [ 'v*.*.*' ]

env:
  BUILD_TYPE: Release

jobs:
  build-win:
    uses: ./.github/workflows/ci-windows.yml

  build-darwin:
    uses: ./.github/workflows/ci-darwin.yml

  build-android:
    uses: ./.github/workflows/ci-android.yml

  releasing:
    runs-on: ubuntu-latest
    needs: ['build-win', 'build-darwin', 'build-android']
    if: '!cancelled()'

    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: 'outputs/'

      - name: Zipping all things
        if: '!cancelled()'
        run: |
          ls -R "${{github.workspace}}/outputs/"
          pushd "${{github.workspace}}"
          zip -r "${{github.workspace}}/output.zip" "outputs/"
          popd

      - name: Upload binaries to release
        if: '!cancelled()'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: "${{github.workspace}}/output.zip"
          asset_name: "uniasset-audioplayer-native-libraries.zip"
